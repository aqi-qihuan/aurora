# Aurora Go 博客系统配置文件
# 基于 Java application-prod.yml 迁移
#
# 环境变量覆盖规则 (viper AutomaticEnv):
#   AURORA_ 前缀 + 下划线分隔层级
#   例: mysql.password → AURORA_MYSQL_PASSWORD
#   例: redis.host     → AURORA_REDIS_HOST
#   环境变量值会覆盖此文件中的同名字段
#
# 敏感信息请通过环境变量注入，不要直接写在此文件中！

server:
  port: 8080
  mode: release
  site_url: https://www.aqi125.cn
  enable_scheduler: true  # 是否启用定时任务调度器

mysql:
  host: 134.175.206.158
  port: 3306
  user: root
  password: "aqi1015"            # 通过 AURORA_MYSQL_PASSWORD 注入
  dbname: aurora
  max_open_conns: 20
  max_idle_conns: 5
  max_lifetime: 1800

redis:
  host: 134.175.206.158
  port: 6379
  password: "aqi1015"            # 通过 AURORA_REDIS_PASSWORD 注入
  db: 1
  pool_size: 100

rabbitmq:
  host: 134.175.206.158
  port: 5672
  user: myroot             # 通过 AURORA_RABBITMQ_USER 覆盖
  password: "myaqi1015"            # 通过 AURORA_RABBITMQ_PASSWORD 注入
  vhost: /
  prefetch_count: 10

elasticsearch:
  urls:
    - "http://134.175.206.158:9200"
  index_name: article
  username: "user_admin"            # 通过 AURORA_ELASTICSEARCH_USERNAME 注入
  password: "user_aqi125.cn"            # 通过 AURORA_ELASTICSEARCH_PASSWORD 注入
  sniff_enabled: false

minio:
  endpoint: "http://134.175.206.158:9000"
  url: "https://ws.aqi125.cn"          # 外部访问URL (对标Java minio.url, 用于前端加载图片)
  access_key: "aqi125"          # 通过 AURORA_MINIO_ACCESS_KEY 注入
  secret_key: "aqi1015."          # 通过 AURORA_MINIO_SECRET_KEY 注入
  bucket: aurora
  use_ssl: false

# 搜索模式: mysql / elasticsearch
search:
  mode: elasticsearch

# 上传模式: minio / oss
upload:
  mode: minio

jwt:
  secret: "YXVyb3JhLXNlY3JldC1rZXktZm9yLXNwcmluZy1ib290LTMtMi0xMg=="              # 通过 AURORA_JWT_SECRET 注入
  expire_time: 168
  issuer: aurora-go

qq:
  app_id: "102007196"
  check_token_url: "https://graph.qq.com/oauth2.0/me?access_token={access_token}"
  user_info_url: "https://graph.qq.com/user/get_user_info?openid={openid}&access_token={access_token}&oauth_consumer_key={oauth_consumer_key}"

ip2region:
  enabled: true
  db_file: "ip2region.xdb"   # 相对路径（相对于项目根目录），会自动拼接 scripts/ip/ 前缀

log:
  level: info
  format: json
  output_path: ""

email:
  enabled: false          # 通过 AURORA_EMAIL_ENABLED 覆盖
  host: smtp.qq.com
  port: 465
  username: "a4i.icu@qq.com"            # 通过 AURORA_EMAIL_USERNAME 注入
  password: "xydwwqkthweuecdf"            # 通过 AURORA_EMAIL_PASSWORD 注入
  from_name: Aurora Blog
  is_ssl: true
  verify_code_expire: 5

baidu_seo:
  enabled: false
  token: ""

agent:
  enabled: false
  llm:
    default_provider: deepseek
    providers:
      openai:
        api_key: ""       # 通过 OPENAI_API_KEY 注入
        base_url: https://api.openai.com/v1
        model: gpt-4o-mini
        temperature: 0.7
        max_tokens: 2000
      deepseek:
        api_key: ""       # 通过 DEEPSEEK_API_KEY 注入
        base_url: https://api.deepseek.com/v1
        model: deepseek-chat
        temperature: 0.7
        max_tokens: 2000
      qwen:
        api_key: ""       # 通过 QWEN_API_KEY 注入
        base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
        model: qwen-plus
        temperature: 0.7
        max_tokens: 2000
      claude:
        api_key: ""       # 通过 CLAUDE_API_KEY 注入
        base_url: https://api.anthropic.com/v1
        model: claude-sonnet-4-20250514
        temperature: 0.7
        max_tokens: 2000
  memory:
    type: redis
    max_turns: 20
