version: '3.8'

# ============================================
# Aurora Go - 完整Docker编排 (含所有中间件)
# 使用: make docker-up
# ============================================

services:

  # ========== Aurora Go 后端 ==========
  aurora-go:
    build:
      context: .
      dockerfile: Dockerfile
    image: aurora-go:latest
    container_name: aurora-go-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      GIN_MODE: release
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - aurora-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'

  # ========== MySQL 9 ==========
  mysql:
    image: mysql:9.0
    container_name: aurora-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=100
      - --innodb_buffer_pool_size=256M
      - --innodb_log_buffer_size=16M
      - --slow_query_log=ON
      - --long_query_time=2
      - --log_queries_not_using_indexes=ON
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-aurora_root_2024}
      MYSQL_DATABASE: ${MYSQL_DB:-aurora}
      MYSQL_USER: ${MYSQL_USER:-aurora}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aurora_password_2024}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-aurora_root_2024}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - aurora-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ========== Redis 7 ==========
  redis:
    image: redis:7-alpine
    container_name: aurora-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-aurora_redis_2024}
      --maxmemory 32mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 60
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-aurora_redis_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aurora-network
    deploy:
      resources:
        limits:
          memory: 64M

  # ========== RabbitMQ 3 ==========
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: aurora-mq
    restart: unless-stopped
    hostname: aurora-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - mq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - aurora-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ========== Elasticsearch 8.x ==========
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: aurora-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
      - "indices.query.bool.max_clause_count=10240"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${ES_PORT:-9200}:9200"
      - "${ES_TRANSPORT_PORT:-9300}:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - ./scripts/es-plugins:/usr/share/elasticsearch/plugins:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - aurora-network
    deploy:
      resources:
        limits:
          memory: 768M

  # ========== MinIO 对象存储 ==========
  minio:
    image: minio/minio:latest
    container_name: aurora-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-auroraminiadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-auroraminiadmin2024}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - aurora-network
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  mq_data:
    driver: local
  es_data:
    driver: local
  minio_data:
    driver: local

networks:
  aurora-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
